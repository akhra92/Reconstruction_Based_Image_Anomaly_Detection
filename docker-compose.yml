services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # Mount model artifacts from the host — train first with `python main.py`
      - ./AE_ResNet50.pth:/app/AE_ResNet50.pth:ro
      - ./threshold.npy:/app/threshold.npy:ro
    restart: unless-stopped

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    ports:
      - "8501:8501"
    volumes:
      - ./AE_ResNet50.pth:/app/AE_ResNet50.pth:ro
      - ./threshold.npy:/app/threshold.npy:ro
    restart: unless-stopped